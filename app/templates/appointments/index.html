{% extends "base.html" %}
{% block title %}Citas - CONNECTA{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Citas</h1>
        <button onclick="openAppointmentModal()" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
            Nueva cita
        </button>
    </div>

    <!-- Status filter -->
    <div class="flex items-center gap-2 mb-4">
        <button onclick="filterAppointments('')" class="apt-filter active text-xs px-3 py-1 rounded-full bg-indigo-100 text-indigo-700" data-filter="">Todas</button>
        <button onclick="filterAppointments('scheduled')" class="apt-filter text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="scheduled">Programadas</button>
        <button onclick="filterAppointments('confirmed')" class="apt-filter text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="confirmed">Confirmadas</button>
        <button onclick="filterAppointments('completed')" class="apt-filter text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="completed">Completadas</button>
        <button onclick="filterAppointments('cancelled')" class="apt-filter text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="cancelled">Canceladas</button>
    </div>

    <div class="bg-white shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mascota</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Motivo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Veterinario</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                </tr>
            </thead>
            <tbody id="appointments-table-body" class="bg-white divide-y divide-gray-200">
                <tr>
                    <td colspan="6" class="px-6 py-8 text-center text-sm text-gray-500">Cargando...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Appointment Modal -->
<div id="appointment-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeAppointmentModal()"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h3 id="appointment-modal-title" class="text-lg font-semibold text-gray-900 mb-4">Nueva cita</h3>
            <form id="appointment-form" class="space-y-4">
                <input type="hidden" id="appointment-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Mascota</label>
                    <select id="appointment-pet" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        <option value="">Seleccionar mascota</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Fecha y hora</label>
                    <input type="datetime-local" id="appointment-date" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Motivo</label>
                    <textarea id="appointment-reason" required rows="3" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Veterinario</label>
                    <input type="text" id="appointment-vet" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeAppointmentModal()" class="rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/appointments.js') }}"></script>
{% endblock %}
