{% extends "base.html" %}
{% block title %}Citas - CONNECTA{% endblock %}

{% block content %}
<div class="main-content">
    <div class="max-w-6xl mx-auto px-6 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Citas</h1>
                <p class="text-sm text-slate-500 mt-1">Agenda de citas veterinarias</p>
            </div>
            <button onclick="openAppointmentModal()" class="btn btn-primary">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Nueva cita
            </button>
        </div>

        <!-- Status filter -->
        <div class="flex items-center gap-2 mb-5">
            <button onclick="filterAppointments('')" class="apt-filter filter-pill active" data-filter="">Todas</button>
            <button onclick="filterAppointments('scheduled')" class="apt-filter filter-pill" data-filter="scheduled">Programadas</button>
            <button onclick="filterAppointments('confirmed')" class="apt-filter filter-pill" data-filter="confirmed">Confirmadas</button>
            <button onclick="filterAppointments('completed')" class="apt-filter filter-pill" data-filter="completed">Completadas</button>
            <button onclick="filterAppointments('cancelled')" class="apt-filter filter-pill" data-filter="cancelled">Canceladas</button>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Mascota</th>
                        <th>Motivo</th>
                        <th>Veterinario</th>
                        <th>Estado</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="appointments-table-body">
                    <tr>
                        <td colspan="6" class="text-center py-10 text-sm text-slate-400">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Appointment Modal -->
<div id="appointment-modal" class="hidden">
    <div class="modal-backdrop" onclick="closeAppointmentModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="appointment-modal-title">Nueva cita</h3>
                <button onclick="closeAppointmentModal()" class="btn btn-ghost p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <form id="appointment-form">
                <div class="modal-body space-y-4">
                    <input type="hidden" id="appointment-id">
                    <div>
                        <label class="form-label">Mascota</label>
                        <select id="appointment-pet" required class="input">
                            <option value="">Seleccionar mascota</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Fecha y hora</label>
                        <input type="datetime-local" id="appointment-date" required class="input">
                    </div>
                    <div>
                        <label class="form-label">Motivo</label>
                        <textarea id="appointment-reason" required rows="3" class="input"></textarea>
                    </div>
                    <div>
                        <label class="form-label">Veterinario</label>
                        <input type="text" id="appointment-vet" class="input">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" onclick="closeAppointmentModal()" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/appointments.js') }}"></script>
{% endblock %}
