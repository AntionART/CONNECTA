{% extends "base.html" %}
{% block title %}Mascotas - CONNECTA{% endblock %}

{% block content %}
<div class="main-content">
    <div class="max-w-6xl mx-auto px-6 py-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Mascotas</h1>
                <p class="text-sm text-slate-500 mt-1">Registro de pacientes de la clinica</p>
            </div>
            <button onclick="openPetModal()" class="btn btn-primary">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Nueva mascota
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Especie</th>
                        <th>Raza</th>
                        <th>Edad</th>
                        <th>Peso</th>
                        <th>Dueno</th>
                        <th>Telefono</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="pets-table-body">
                    <tr>
                        <td colspan="8" class="text-center py-10 text-sm text-slate-400">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Pet Modal -->
<div id="pet-modal" class="hidden">
    <div class="modal-backdrop" onclick="closePetModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="pet-modal-title">Nueva mascota</h3>
                <button onclick="closePetModal()" class="btn btn-ghost p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <form id="pet-form">
                <div class="modal-body space-y-4">
                    <input type="hidden" id="pet-id">
                    <div>
                        <label class="form-label">Nombre</label>
                        <input type="text" id="pet-name" required class="input">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="form-label">Especie</label>
                            <select id="pet-species" required class="input">
                                <option value="">Seleccionar</option>
                                <option value="dog">Perro</option>
                                <option value="cat">Gato</option>
                                <option value="bird">Ave</option>
                                <option value="rabbit">Conejo</option>
                                <option value="other">Otro</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Raza</label>
                            <input type="text" id="pet-breed" class="input">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="form-label">Edad (anos)</label>
                            <input type="number" id="pet-age" min="0" step="0.1" class="input">
                        </div>
                        <div>
                            <label class="form-label">Peso (kg)</label>
                            <input type="number" id="pet-weight" min="0" step="0.1" class="input">
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Nombre del dueno</label>
                        <input type="text" id="pet-owner-name" class="input">
                    </div>
                    <div>
                        <label class="form-label">Telefono del dueno</label>
                        <input type="text" id="pet-owner-phone" required class="input">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" onclick="closePetModal()" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pets.js') }}"></script>
{% endblock %}
